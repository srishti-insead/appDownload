<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download My Ayur Diet & Wellness App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --clr-bg: #faf7f2;
      --clr-card: #ffffff;
      --clr-primary: #4a7c59;
      --clr-primary-dark: #3a6347;
      --clr-accent: #c7a84e;
      --clr-text: #2c2c2c;
      --clr-muted: #7a7a7a;
      --clr-border: #e8e2d8;
      --clr-ios: #0071e3;
      --clr-ios-hover: #005bb5;
      --clr-android: #34a853;
      --clr-android-hover: #2a8a44;
      --shadow: 0 8px 40px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--clr-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(74,124,89,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(199,168,78,0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .card {
      background: var(--clr-card);
      border: 1px solid var(--clr-border);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .leaf {
      display: inline-block;
      font-size: 48px;
      margin-bottom: 16px;
      animation: gentle 3s ease-in-out infinite;
    }

    @keyframes gentle {
      0%, 100% { transform: rotate(-5deg) scale(1); }
      50% { transform: rotate(5deg) scale(1.05); }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      color: var(--clr-text);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--clr-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 36px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .btn-ios {
      background: var(--clr-ios);
    }
    .btn-ios:hover {
      background: var(--clr-ios-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,113,227,0.3);
    }

    .btn-android {
      background: var(--clr-android);
    }
    .btn-android:hover {
      background: var(--clr-android-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(52,168,83,0.3);
    }

    .btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
      color: var(--clr-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--clr-border);
    }

    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--clr-border);
      font-size: 0.8rem;
      color: var(--clr-muted);
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
  <script>
    (function() {
      var ua = navigator.userAgent || navigator.vendor;
      var isAndroid = /android/i.test(ua);
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

      if (isAndroid) {
        window.location.href = "https://play.google.com/store/apps/details?id=com.sreshtayurveda.myayur";
      } else if (isIOS) {
        window.location.href = "https://apps.apple.com/au/app/my-ayur-diet-wellness-app/id6753059361";
      }
      // Desktop users see the landing page with both buttons
    })();
  </script>
</head>
<body>
  <div class="card">
    <div class="leaf">🌿</div>
    <h1>My Ayur Diet & Wellness</h1>
    <p class="subtitle">Your personalized Ayurvedic diet and wellness companion. Download the app now.</p>

    <div class="buttons">
      <a href="https://apps.apple.com/au/app/my-ayur-diet-wellness-app/id6753059361" class="btn btn-ios">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Download for iPhone
      </a>

      <div class="divider">or</div>

      <a href="https://play.google.com/store/apps/details?id=com.sreshtayurveda.myayur" class="btn btn-android">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.04c-.35-.2-.57-.59-.57-1.04V2c0-.45.22-.84.58-1.04L14.54 12 3.18 23.04zm1.82-1.93L15.6 12 5 2.89v18.22zM20.16 11l-2.62-1.52L15.17 12l2.37 2.52L20.16 13c.67-.39.67-1.62 0-2zM5.71 1.11L17.04 7.6l-2.87 3.06L5.71 1.11zm0 21.78l8.46-9.55 2.87 3.06L5.71 22.89z"/></svg>
        Download for Android
      </a>
    </div>

    <div class="footer">
      Sreshta Ayurveda
    </div>
  </div>
</body>
</html>
